<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心绘制器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e0e0e0;
        }

        h1 {
            margin-top: 30px;
            font-size: 2rem;
            background: linear-gradient(90deg, #ff6b6b, #ee5a24, #ff6b6b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            align-items: center;
            margin: 24px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: #aaa;
        }

        .color-picker-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.3s;
        }

        .color-picker-wrapper:hover {
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border: none;
            cursor: pointer;
        }

        .preset-colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preset-color {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
        }

        .preset-color:hover {
            transform: scale(1.15);
        }

        .preset-color.active {
            border-color: #fff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-draw {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
        }

        .btn-draw:hover {
            box-shadow: 0 6px 20px rgba(238, 90, 36, 0.6);
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-random {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .btn-random:hover {
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
        }

        .canvas-container {
            position: relative;
            margin: 10px 0 30px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        canvas {
            display: block;
            background: radial-gradient(ellipse at center, #1e1e3a 0%, #0d0d1a 100%);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ff6b6b;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>爱心绘制器</h1>

    <div class="controls">
        <!-- 预设颜色 -->
        <div class="control-group">
            <label>预设颜色</label>
            <div class="preset-colors" id="presetColors">
                <div class="preset-color active" style="background: #ff6b6b" data-color="#ff6b6b" title="珊瑚红"></div>
                <div class="preset-color" style="background: #ee5a24" data-color="#ee5a24" title="热情橙"></div>
                <div class="preset-color" style="background: #e84393" data-color="#e84393" title="玫瑰粉"></div>
                <div class="preset-color" style="background: #fd79a8" data-color="#fd79a8" title="樱花粉"></div>
                <div class="preset-color" style="background: #a29bfe" data-color="#a29bfe" title="薰衣紫"></div>
                <div class="preset-color" style="background: #74b9ff" data-color="#74b9ff" title="天空蓝"></div>
                <div class="preset-color" style="background: #55efc4" data-color="#55efc4" title="薄荷绿"></div>
                <div class="preset-color" style="background: #ffeaa7" data-color="#ffeaa7" title="柠檬黄"></div>
            </div>
        </div>

        <!-- 自定义颜色 -->
        <div class="control-group">
            <label>自定义颜色</label>
            <div class="color-picker-wrapper">
                <input type="color" id="colorPicker" value="#ff6b6b">
            </div>
        </div>

        <!-- 大小控制 -->
        <div class="control-group">
            <label>大小 <span id="sizeValue">8</span></label>
            <input type="range" id="sizeSlider" min="3" max="20" value="8">
        </div>

        <!-- 动画开关 -->
        <div class="control-group">
            <label>效果</label>
            <div class="checkbox-group">
                <input type="checkbox" id="animToggle" checked>
                <label for="animToggle">跳动动画</label>
            </div>
        </div>

        <!-- 粒子开关 -->
        <div class="control-group">
            <label>&nbsp;</label>
            <div class="checkbox-group">
                <input type="checkbox" id="particleToggle" checked>
                <label for="particleToggle">粒子效果</label>
            </div>
        </div>

        <!-- 按钮 -->
        <div class="control-group" style="flex-direction: row; gap: 10px;">
            <button class="btn btn-draw" id="drawBtn">绘制爱心</button>
            <button class="btn btn-random" id="randomBtn">随机散落</button>
            <button class="btn btn-clear" id="clearBtn">清空画布</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="heartCanvas" width="700" height="550"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        const animToggle = document.getElementById('animToggle');
        const particleToggle = document.getElementById('particleToggle');
        const drawBtn = document.getElementById('drawBtn');
        const randomBtn = document.getElementById('randomBtn');
        const clearBtn = document.getElementById('clearBtn');
        const presetColorsContainer = document.getElementById('presetColors');

        let currentColor = '#ff6b6b';
        let hearts = [];
        let particles = [];
        let animationId = null;
        let isAnimating = false;

        // 预设颜色点击
        presetColorsContainer.addEventListener('click', (e) => {
            const el = e.target.closest('.preset-color');
            if (!el) return;
            currentColor = el.dataset.color;
            colorPicker.value = currentColor;
            document.querySelectorAll('.preset-color').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        });

        // 自定义颜色变化
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            document.querySelectorAll('.preset-color').forEach(p => p.classList.remove('active'));
        });

        // 大小滑块
        sizeSlider.addEventListener('input', (e) => {
            sizeValue.textContent = e.target.value;
        });

        // 爱心类
        class Heart {
            constructor(x, y, size, color, animated = true) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.animated = animated;
                this.scale = animated ? 0 : 1;
                this.targetScale = 1;
                this.opacity = 1;
                this.beatPhase = Math.random() * Math.PI * 2;
                this.birthTime = Date.now();
            }

            draw(ctx, time) {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.animated) {
                    // 入场动画
                    const age = (Date.now() - this.birthTime) / 400;
                    if (age < 1) {
                        this.scale = easeOutBack(age);
                    } else {
                        // 跳动动画
                        this.scale = 1 + 0.06 * Math.sin(time * 3 + this.beatPhase);
                    }
                }

                ctx.scale(this.scale, this.scale);
                ctx.globalAlpha = this.opacity;

                // 绘制爱心路径
                this.drawHeartPath(ctx);

                // 渐变填充
                const gradient = ctx.createRadialGradient(
                    -this.size * 0.2, -this.size * 0.3, 0,
                    0, 0, this.size * 1.2
                );
                const rgb = hexToRgb(this.color);
                gradient.addColorStop(0, `rgba(${Math.min(255, rgb.r + 60)}, ${Math.min(255, rgb.g + 60)}, ${Math.min(255, rgb.b + 60)}, 1)`);
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, `rgba(${Math.max(0, rgb.r - 40)}, ${Math.max(0, rgb.g - 40)}, ${Math.max(0, rgb.b - 40)}, 1)`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // 高光
                ctx.beginPath();
                ctx.ellipse(
                    -this.size * 0.3,
                    -this.size * 0.35,
                    this.size * 0.15,
                    this.size * 0.25,
                    -0.3,
                    0, Math.PI * 2
                );
                ctx.fillStyle = `rgba(255, 255, 255, 0.25)`;
                ctx.fill();

                ctx.restore();
            }

            drawHeartPath(ctx) {
                const s = this.size;
                ctx.beginPath();
                ctx.moveTo(0, s * 0.3);
                // 左半边
                ctx.bezierCurveTo(-s * 0.1, s * 0.1, -s * 0.7, -s * 0.1, -s * 0.7, -s * 0.4);
                ctx.bezierCurveTo(-s * 0.7, -s * 0.8, -s * 0.2, -s * 0.9, 0, -s * 0.5);
                // 右半边
                ctx.bezierCurveTo(s * 0.2, -s * 0.9, s * 0.7, -s * 0.8, s * 0.7, -s * 0.4);
                ctx.bezierCurveTo(s * 0.7, -s * 0.1, s * 0.1, s * 0.1, 0, s * 0.3);
                ctx.closePath();
            }
        }

        // 粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 2;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.size = 1 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 重力
                this.life -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 辅助函数
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 107, b: 107 };
        }

        function easeOutBack(t) {
            const c1 = 1.70158;
            const c3 = c1 + 1;
            return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
        }

        // 在爱心轮廓上生成粒子
        function spawnParticles(heart) {
            const rgb = hexToRgb(heart.color);
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = heart.size * (0.5 + Math.random() * 0.3);
                const px = heart.x + Math.cos(angle) * dist;
                const py = heart.y + Math.sin(angle) * dist;
                const pColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${0.5 + Math.random() * 0.5})`;
                particles.push(new Particle(px, py, pColor));
            }
        }

        // 主动画循环
        function animate() {
            const time = Date.now() / 1000;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制所有爱心
            hearts.forEach(heart => {
                heart.draw(ctx, time);
                // 随机生成粒子
                if (particleToggle.checked && Math.random() < 0.08) {
                    spawnParticles(heart);
                }
            });

            // 更新和绘制粒子
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            animationId = requestAnimationFrame(animate);
        }

        function startAnimation() {
            if (!isAnimating) {
                isAnimating = true;
                animate();
            }
        }

        function stopAnimation() {
            if (isAnimating) {
                cancelAnimationFrame(animationId);
                isAnimating = false;
            }
        }

        // 绘制中心爱心
        drawBtn.addEventListener('click', () => {
            const size = parseInt(sizeSlider.value);
            const heart = new Heart(
                canvas.width / 2,
                canvas.height / 2 + size * 2,
                size * 5,
                currentColor,
                animToggle.checked
            );
            hearts.push(heart);
            // 生成入场粒子
            if (particleToggle.checked) {
                for (let i = 0; i < 20; i++) {
                    spawnParticles(heart);
                }
            }
            startAnimation();
        });

        // 随机散落多个小爱心
        randomBtn.addEventListener('click', () => {
            const size = parseInt(sizeSlider.value);
            const count = 8 + Math.floor(Math.random() * 8);
            for (let i = 0; i < count; i++) {
                const heartSize = size * (0.8 + Math.random() * 1.5);
                const x = heartSize + Math.random() * (canvas.width - heartSize * 2);
                const y = heartSize + Math.random() * (canvas.height - heartSize * 2);
                // 轻微随机化颜色
                const rgb = hexToRgb(currentColor);
                const variation = 30;
                const r = Math.min(255, Math.max(0, rgb.r + (Math.random() - 0.5) * variation));
                const g = Math.min(255, Math.max(0, rgb.g + (Math.random() - 0.5) * variation));
                const b = Math.min(255, Math.max(0, rgb.b + (Math.random() - 0.5) * variation));
                const color = `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
                const heart = new Heart(x, y, heartSize, color, animToggle.checked);
                heart.birthTime = Date.now() + i * 80; // 依次出现
                hearts.push(heart);
            }
            startAnimation();
        });

        // 清空
        clearBtn.addEventListener('click', () => {
            hearts = [];
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // 点击画布添加爱心
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const size = parseInt(sizeSlider.value);
            const heart = new Heart(x, y, size * 2, currentColor, animToggle.checked);
            hearts.push(heart);
            if (particleToggle.checked) {
                for (let i = 0; i < 12; i++) {
                    spawnParticles(heart);
                }
            }
            startAnimation();
        });

        // 初始绘制
        startAnimation();
    </script>
</body>
</html>
